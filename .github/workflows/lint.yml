name: Lint (ruff + ty)

# Two things here:
#   1. Advisory diff — ruff + ty diagnostics as a diff vs the target branch.
#      Posts a Markdown summary and a PR comment. Exit zero always.
#   2. Blocking ``ruff check .`` — enforces the explicit rules in
#      ``[tool.ruff.lint.select]`` (currently PLW1514). Failure blocks merge.
#      Separate job so the advisory diff still runs and posts even when
#      enforcement fails.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "website/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "website/**"

permissions:
  contents: read
  pull-requests: write # needed to post/update PR comments

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-diff:
    name: ruff + ty diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # need full history for merge-base + worktree

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install ruff + ty
        run: |
          uv tool install ruff
          uv tool install ty

      - name: Determine base ref
        id: base
        run: |
          # For PRs, diff against the merge base with the target branch.
          # For pushes to main, diff against the previous commit on main.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
            BASE_REF="HEAD~1"
          fi
          echo "sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "Base SHA: ${BASE_SHA}"
          echo "Base ref: ${BASE_REF}"

      - name: Run ruff + ty on HEAD
        run: |
          mkdir -p .lint-reports/head
          ruff check --output-format json --exit-zero \
            > .lint-reports/head/ruff.json || true
          ty check --output-format gitlab --exit-zero \
            > .lint-reports/head/ty.json || true
          echo "HEAD ruff: $(wc -c < .lint-reports/head/ruff.json) bytes"
          echo "HEAD ty:   $(wc -c < .lint-reports/head/ty.json) bytes"

      - name: Run ruff + ty on base (via git worktree)
        run: |
          mkdir -p .lint-reports/base
          # Use a worktree so we don't clobber the main checkout. If the basex
          # SHA is identical to HEAD (e.g. first commit), skip and leave the
          # base reports empty — the diff script handles missing files.
          HEAD_SHA=$(git rev-parse HEAD)
          BASE_SHA="${{ steps.base.outputs.sha }}"
          if [ "$BASE_SHA" = "$HEAD_SHA" ]; then
            echo "Base SHA == HEAD SHA, skipping base scan."
            echo '[]' > .lint-reports/base/ruff.json
            echo '[]' > .lint-reports/base/ty.json
          else
            git worktree add --detach /tmp/lint-base "$BASE_SHA"
            (
              cd /tmp/lint-base
              ruff check --output-format json --exit-zero \
                > "$GITHUB_WORKSPACE/.lint-reports/base/ruff.json" || true
              ty check --output-format gitlab --exit-zero \
                > "$GITHUB_WORKSPACE/.lint-reports/base/ty.json" || true
            )
            git worktree remove --force /tmp/lint-base
          fi
          echo "base ruff: $(wc -c < .lint-reports/base/ruff.json) bytes"
          echo "base ty:   $(wc -c < .lint-reports/base/ty.json) bytes"

      - name: Generate diff summary
        run: |
          python scripts/lint_diff.py \
            --base-ruff .lint-reports/base/ruff.json \
            --head-ruff .lint-reports/head/ruff.json \
            --base-ty   .lint-reports/base/ty.json \
            --head-ty   .lint-reports/head/ty.json \
            --base-ref  "${{ steps.base.outputs.ref }}" \
            --head-ref  "${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}" \
            --output    .lint-reports/summary.md
          cat .lint-reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-reports
          path: .lint-reports/
          retention-days: 14

      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.lint-reports/summary.md', 'utf8');
            const marker = '<!-- lint-diff-summary -->';
            const fullBody = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }


  ruff-blocking:
    # Enforce the ruff rules in pyproject.toml [tool.ruff.lint.select] on
    # files changed in the PR (or the latest push to main).  Existing code
    # is grandfathered — see AGENTS.md "Code Quality Checks" — so we
    # intentionally do NOT run ``ruff check .`` here.  Failure blocks
    # merge; the advisory ``lint-diff`` job above runs independently so
    # reviewers still get the diff comment even when enforcement fails.
    name: ruff enforcement (blocking, PR diff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # need history for merge-base

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install ruff
        run: uv tool install ruff

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          else
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          echo "sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Base SHA: ${BASE_SHA}"

      - name: Collect changed Python files
        id: changed
        run: |
          # Added/Copied/Modified/Renamed — skip Deleted.  NUL-delimited to
          # tolerate spaces/unicode in paths.
          git diff -z --name-only --diff-filter=ACMR \
              "${{ steps.base.outputs.sha }}" HEAD -- '*.py' \
            > .changed-py.nul || true
          if [ ! -s .changed-py.nul ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No Python files changed; skipping ruff."
          else
            COUNT=$(tr -cd '\0' < .changed-py.nul | wc -c)
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "Changed Python files: ${COUNT}"
            xargs -0 -n1 echo < .changed-py.nul
          fi

      - name: ruff check (changed lines only)
        if: steps.changed.outputs.count != '0'
        # Line-level filter: only diagnostics on lines added/modified vs the
        # base SHA fail the job.  Touching one line in a legacy file does
        # NOT make every pre-existing violation in that file fail CI — see
        # AGENTS.md "Code Quality Checks".
        run: python scripts/lint_changed_lines.py --tool ruff --base "${{ steps.base.outputs.sha }}"

  pylint-blocking:
    # Enforce pylint on files changed in the PR.  Existing code is
    # grandfathered — see AGENTS.md "Code Quality Checks".  Pylint is
    # configured under [tool.pylint.*] in pyproject.toml.
    name: pylint enforcement (blocking, PR diff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # need history for merge-base

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.11"

      - name: Install pylint
        # Install pylint only — running ``pip install -e .[dev]`` would pull
        # in the entire dependency tree just to run a linter.  Pylint will
        # emit ``import-error`` for unresolved imports; we disable that
        # message at invocation time so we don't have to install every
        # transitive dep just for lint.
        run: pip install 'pylint>=3.0,<4'

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          else
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          echo "sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Collect changed Python files
        id: changed
        run: |
          git diff -z --name-only --diff-filter=ACMR \
              "${{ steps.base.outputs.sha }}" HEAD -- '*.py' \
            > .changed-py.nul || true
          if [ ! -s .changed-py.nul ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No Python files changed; skipping pylint."
          else
            COUNT=$(tr -cd '\0' < .changed-py.nul | wc -c)
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "Changed Python files: ${COUNT}"
            xargs -0 -n1 echo < .changed-py.nul
          fi

      - name: pylint (changed lines only)
        if: steps.changed.outputs.count != '0'
        # ``import-error`` / ``no-name-in-module`` disabled inside the helper
        # because we don't install runtime deps in this job.  Line-level
        # filter — only diagnostics on lines added/modified vs the base
        # SHA fail the job.  See AGENTS.md "Code Quality Checks".
        run: python scripts/lint_changed_lines.py --tool pylint --base "${{ steps.base.outputs.sha }}"

  windows-footguns:
    # Static guardrails on Windows-unsafe Python primitives — os.kill(pid, 0),
    # os.killpg, os.setsid, signal.SIGKILL without getattr fallback,
    # shebang scripts via subprocess, bare open() without encoding=, etc.
    # See scripts/check-windows-footguns.py for the full rule list.
    name: Windows footguns (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.11"

      - name: Run footgun checker
        run: python scripts/check-windows-footguns.py --all
